<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Car Dodger</title>
  <style>
    body { margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:#222; }
    canvas { background:#555; border:4px solid #fff; }
  </style>
</head>
<body>
<canvas id="game" width="300" height="500"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

const player = { x: 130, y: 420, w: 40, h: 70, speed: 5 };
const keys = {};
let enemy = { x: Math.random() * 260, y: -80, w: 40, h: 70, speed: 4 };
let score = 0;

addEventListener("keydown", e => keys[e.key] = true);
addEventListener("keyup", e => keys[e.key] = false);

function update() {
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;
  player.x = Math.max(0, Math.min(c.width - player.w, player.x));

  enemy.y += enemy.speed;
  if (enemy.y > c.height) {
    enemy.y = -80;
    enemy.x = Math.random() * (c.width - enemy.w);
    score++;
  }

  if (player.x < enemy.x + enemy.w &&
      player.x + player.w > enemy.x &&
      player.y < enemy.y + enemy.h &&
      player.y + player.h > enemy.y) {
    alert("Game Over! Score: " + score);
    location.reload();
  }
}

function drawCar(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 40, 70);
  ctx.fillStyle = "#fff";
  ctx.fillRect(x + 8, y + 10, 24, 15);
}

function loop() {
  update();

  ctx.fillStyle = "#666";
  ctx.fillRect(0, 0, c.width, c.height);

  ctx.strokeStyle = "#fff";
  ctx.setLineDash([20, 20]);
  ctx.beginPath();
  ctx.moveTo(c.width / 2, 0);
  ctx.lineTo(c.width / 2, c.height);
  ctx.stroke();
  ctx.setLineDash([]);

  drawCar(player.x, player.y, "lime");
  drawCar(enemy.x, enemy.y, "red");

  ctx.fillStyle = "#fff";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
