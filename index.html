<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pong</title>
  <style>
    body { margin: 0; background: #111; display: grid; place-items: center; height: 100vh; }
    canvas { background: #000; border: 2px solid #fff; }
  </style>
</head>
<body>
<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const left = { x: 20, y: 200, w: 10, h: 100, dy: 0 };
const right = { x: 770, y: 200, w: 10, h: 100 };
const ball = { x: 400, y: 250, vx: 5, vy: 3, r: 8 };

let scoreL = 0, scoreR = 0;

document.addEventListener("keydown", e => {
  if (e.key === "w") left.dy = -6;
  if (e.key === "s") left.dy = 6;
});
document.addEventListener("keyup", e => {
  if (e.key === "w" || e.key === "s") left.dy = 0;
});

function loop() {
  left.y += left.dy;
  left.y = Math.max(0, Math.min(canvas.height - left.h, left.y));

  right.y += (ball.y - (right.y + right.h / 2)) * 0.08;

  ball.x += ball.vx;
  ball.y += ball.vy;

  if (ball.y < ball.r || ball.y > canvas.height - ball.r) ball.vy *= -1;

  [left, right].forEach(p => {
    if (ball.x - ball.r < p.x + p.w &&
        ball.x + ball.r > p.x &&
        ball.y + ball.r > p.y &&
        ball.y - ball.r < p.y + p.h) {
      ball.vx *= -1;
    }
  });

  if (ball.x < 0) { scoreR++; reset(); }
  if (ball.x > canvas.width) { scoreL++; reset(); }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#fff";
  ctx.fillRect(left.x,left.y,left.w,left.h);
  ctx.fillRect(right.x,right.y,right.w,right.h);

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fill();

  ctx.font = "32px Arial";
  ctx.fillText(scoreL, 300, 40);
  ctx.fillText(scoreR, 480, 40);

  requestAnimationFrame(loop);
}

function reset() {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.vx *= -1;
}

loop();
</script>
</body>
</html>
